version: '3.9'

services:
  backend:
    build:
      context: ./backend
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app/backend
      - ./backend/data:/app/backend/data
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app

  frontend:
    build:
      context: ./frontend
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
